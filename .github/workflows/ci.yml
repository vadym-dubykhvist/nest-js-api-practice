name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:check

      - name: Unit tests
        run: pnpm test

  e2e:
    name: E2E tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nestjs_practice_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: E2E tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: pnpm test:e2e --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USERNAME: test
          DB_PASSWORD: test
          DB_NAME: nestjs_practice_test
          DB_SYNCHRONIZE: 'true'
          JWT_SECRET: test-secret

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test, e2e]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: nestjs-practice-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
